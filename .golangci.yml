version: "2"
linters:
  enable:
    - gocognit
    - gocyclo
    - gosec
    - misspell
    - revive
    - unconvert

run:
  timeout: 1m
  issues-exit-code: 1
  tests: false
  enable-build-vcs: false
  allow-parallel-runners: true
  allow-serial-runners: false
  go: "1.26"
  concurrency: 4
  modules-download-mode: mod
  
output:
  path-mode: abs
  path-prefix: ""
  show-stats: true

formatters:
  enable:
    - gofmt
    - swaggo
    - goimports
    

