services:
  keycloak:
    build: .
    command: start-dev --import-realm --features=preview,organization
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: secret
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - ./testdata/gocloak-realm.json:/opt/keycloak/data/import/gocloak-realm.json
